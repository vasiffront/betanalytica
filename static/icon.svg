<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#0d2318"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#0d1117"/>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Chart line with glow -->
  <polyline points="72,370 172,255 268,305 362,175 460,95"
    fill="none" stroke="url(#line)" stroke-width="38"
    stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Key dots -->
  <circle cx="172" cy="255" r="22" fill="#58a6ff" opacity=".9"/>
  <circle cx="362" cy="175" r="22" fill="#58a6ff" opacity=".9"/>
  <!-- Top dot — accent -->
  <circle cx="460" cy="95" r="28" fill="#3fb950"/>
  <circle cx="460" cy="95" r="16" fill="#fff" opacity=".25"/>
  <!-- Baseline -->
  <line x1="58" y1="415" x2="454" y2="415" stroke="#21262d" stroke-width="8" stroke-linecap="round"/>
</svg>
