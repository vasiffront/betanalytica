<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#161b22"/>
  <rect width="512" height="512" rx="100" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a2a"/>
      <stop offset="100%" stop-color="#0d2040"/>
    </linearGradient>
  </defs>
  <!-- Chart line -->
  <polyline points="60,360 150,260 240,300 320,180 410,140 460,100"
    fill="none" stroke="#3fb950" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots -->
  <circle cx="150" cy="260" r="18" fill="#58a6ff"/>
  <circle cx="320" cy="180" r="18" fill="#58a6ff"/>
  <circle cx="460" cy="100" r="22" fill="#3fb950"/>
  <!-- Bottom line -->
  <line x1="50" y1="400" x2="462" y2="400" stroke="#30363d" stroke-width="6"/>
</svg>
